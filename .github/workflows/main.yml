# Workflow name
name: Build and Test
# Control how to trigger workflow
on: 
  push: 
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Spin up PostgreSQL as a sidecar container
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        # Wait until postgres is ready before starting the job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.26.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./server
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck and Build
        run: pnpm run build
      - name: Push Database Schema
        env:
          # Use the local service container URL
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test
        run: pnpm exec drizzle-kit push
      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test
          NODE_ENV: test
          PORT: 3000
          ACCESS_TOKEN_EXPIRED: 900
          REFRESH_TOKEN_EXPIRED: 86400
          ATTEMPT_TIME: 3
          ACCOUNT_LOCK_TIME: 500
          TOKEN_VERSION: 1
          TOKEN_EXPIRED: 1000
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          SALT: ${{ secrets.SALT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: pnpm run test
